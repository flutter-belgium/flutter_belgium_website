name: Build and Deploy

on:
  pull_request:
  push:
    branches:
      - main
  repository_dispatch:
    types:
      - content-updated

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter (via FVM config)
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvm/fvm_config.json
          cache: true

      - name: Install dependencies
        run: dart pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib/ test/

      - name: Analyze
        run: dart analyze

      - name: Test
        run: dart test

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter (via FVM config)
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvm/fvm_config.json
          cache: true

      - name: Install dependencies
        run: dart pub get

      - name: Build static site
        run: dart run jaspr_cli:jaspr build

      - name: Remove Dart build artifacts
        run: |
          rm -rf ./build/jaspr/packages
          rm -rf ./build/jaspr/.dart_tool
          rm -f  ./build/jaspr/.build.manifest
          rm -f  ./build/jaspr/main.client.dart

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build/jaspr

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
